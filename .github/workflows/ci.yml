name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install
        run: python -m pip install -e ".[test,data]"
      - name: Unit tests
        run: python -m pytest
      - name: Compile and CLI checks
        run: |
          python -m compileall -q src scripts tests
          for script in scripts/*.py; do
            python "$script" --help >/dev/null
          done
